<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOL Finder — System Flow</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #F7F5F1;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      color: #1a1a1a;
    }

    /* ── HEADER ── */
    header {
      padding: 13px 28px;
      border-bottom: 1px solid #E8E3DB;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      background: #F7F5F1;
    }

    .logo {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #aaa;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .divider-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #D5CFC5;
    }

    .page-title {
      font-size: 12px;
      color: #999;
      letter-spacing: 0.04em;
    }

    .hint {
      margin-left: auto;
      font-size: 11px;
      color: #bbb;
      font-family: 'SF Mono', monospace;
    }

    /* ── LAYOUT ── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── CHART ── */
    .chart-container {
      flex: 1;
      overflow: auto;
      padding: 44px 48px 60px;
    }

    .chart-area {
      position: relative;
      width: 480px;
      height: 860px;
    }

    .chart-svg {
      position: absolute;
      inset: 0;
      width: 480px;
      height: 860px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── NODES ── */
    .node {
      position: absolute;
      border-radius: 9px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 7px 11px;
      transition: filter 0.12s ease, transform 0.12s ease;
      z-index: 2;
      user-select: none;
    }

    .node:hover  { filter: brightness(0.95); transform: translateY(-1px); }
    .node.active { outline: 2px solid rgba(0,0,0,0.2); outline-offset: 3px; }

    .node-label {
      font-size: 12px;
      font-weight: 650;
      color: #111;
      line-height: 1.3;
      white-space: nowrap;
    }

    .node-sublabel {
      font-size: 9.5px;
      color: rgba(0,0,0,0.42);
      margin-top: 3px;
      line-height: 1.35;
    }

    /* colour palette */
    .t-input   { background: #A2DDD0; }
    .t-skill   { background: #F0A896; }
    .t-process { background: #EDA082; }
    .t-config  { background: #B0C4EE; }
    .t-sub     { background: #F2C290; }
    .t-output  { background: #A6BEEF; }
    .t-opt     { background: #D4C5F0; } /* purple — optional steps */

    .t-api {
      background: #3E6FDB;
      border-radius: 20px;
      cursor: default;
    }
    .t-api .node-label  { color: #fff; font-size: 10.5px; }
    .t-api .node-sublabel { display: none; }
    .t-api:hover { filter: none; transform: none; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 375px;
      flex-shrink: 0;
      border-left: 1px solid #E8E3DB;
      overflow-y: auto;
      background: #F7F5F1;
      display: flex;
      flex-direction: column;
    }

    .sidebar-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-size: 12px;
      text-align: center;
      padding: 40px;
      gap: 12px;
      line-height: 1.5;
    }

    /* detail card */
    .detail-header {
      padding: 16px 24px 15px;
      flex-shrink: 0;
    }

    .detail-title {
      font-size: 13px;
      font-weight: 700;
      color: rgba(0,0,0,0.8);
      font-family: 'SF Mono', 'Fira Code', monospace;
      letter-spacing: -0.01em;
    }

    .detail-badge {
      display: inline-block;
      margin-top: 5px;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: rgba(0,0,0,0.12);
      color: rgba(0,0,0,0.5);
      border-radius: 4px;
      padding: 2px 7px;
      font-family: 'SF Mono', monospace;
    }

    .detail-body {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      flex: 1;
    }

    .section-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: #aaa;
      font-family: 'SF Mono', monospace;
      margin-bottom: 7px;
    }

    .section-text {
      font-size: 13px;
      line-height: 1.68;
      color: #555;
    }

    .output-pill {
      display: inline-block;
      background: #EDEAE4;
      border: 1px solid #E0DBD3;
      border-radius: 5px;
      padding: 5px 11px;
      font-size: 11px;
      font-family: 'SF Mono', monospace;
      color: #666;
      margin-top: 2px;
      word-break: break-word;
    }

    .weights-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }

    .weight-chip {
      background: #EDEAE4;
      border: 1px solid #E0DBD3;
      border-radius: 7px;
      padding: 9px 11px;
      font-size: 11px;
      font-family: 'SF Mono', monospace;
      color: #666;
    }

    .weight-chip strong {
      display: block;
      color: #333;
      font-size: 12px;
      margin-bottom: 2px;
      font-weight: 600;
    }

    /* scrollbar */
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: #D5CFC5; border-radius: 4px; }
    .chart-container::-webkit-scrollbar { width: 6px; height: 6px; }
    .chart-container::-webkit-scrollbar-track { background: transparent; }
    .chart-container::-webkit-scrollbar-thumb { background: #D5CFC5; border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <span class="logo">KOL Finder</span>
  <div class="divider-dot"></div>
  <span class="page-title">System Flow</span>
  <span class="hint">click a node →</span>
</header>

<div class="main">

  <!-- ── CHART ── -->
  <div class="chart-container">
    <div class="chart-area" id="chart"></div>
  </div>

  <!-- ── SIDEBAR ── -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-empty">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2.5"/>
        <line x1="8" y1="8" x2="16" y2="8"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
        <line x1="8" y1="16" x2="12" y2="16"/>
      </svg>
      Click any node<br>to see details
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────────

const nodes = [
  // ── FINDER MODE ──────────────────────────────────────────────

  // Two intake paths side by side
  {
    id: 'xlsx', label: 'XLSX Files',
    sub: 'Apify export · multi-file',
    type: 'input', x: 16, y: 44, w: 195, h: 54,
  },
  {
    id: 'scrape_urls', label: 'URLs / Hashtags',
    sub: 'paste directly · no manual Apify',
    type: 'input', x: 221, y: 44, w: 195, h: 54,
  },

  // Parse & aggregate (wide, spanning both inputs)
  {
    id: 'parse', label: 'aggregatePostItems',
    sub: 'Group by username · merge stats · dedupe',
    type: 'skill', x: 74, y: 148, w: 274, h: 54,
  },

  // Config
  {
    id: 'config', label: 'Config Step',
    sub: 'niches · min likes · campaign brief',
    type: 'config', x: 118, y: 252, w: 186, h: 54,
  },

  // Scoring entry
  {
    id: 'batch', label: 'scoreInfluencers',
    sub: 'filter · score · deterministic',
    type: 'process', x: 118, y: 352, w: 186, h: 54,
  },

  // Sub-score fan-out (3 nodes)
  { id: 'n_engage',    label: 'scoreEngagement', sub: 'log-scaled likes/views', type: 'sub', x: 26,  y: 454, w: 124, h: 44 },
  { id: 'n_relevancy', label: 'scoreRelevancy',  sub: 'keyword + niche match',  type: 'sub', x: 159, y: 454, w: 124, h: 44 },
  { id: 'n_bot',       label: 'scoreBotRisk',    sub: 'comment/like ratio',     type: 'sub', x: 292, y: 454, w: 124, h: 44 },

  // Weighted result
  {
    id: 'weighted', label: 'Overall Score',
    sub: 'engagement × 8 + relevancy × 2',
    type: 'process', x: 118, y: 548, w: 186, h: 54,
  },

  // Results table
  {
    id: 'results', label: 'Results Table',
    sub: 'Sort · Filter · Export XLSX',
    type: 'output', x: 118, y: 648, w: 186, h: 54,
  },

  // Optional: Fetch Live Stats
  {
    id: 'live_stats', label: 'Fetch Live Stats',
    sub: 'Apify batch · ~$0.01/account',
    type: 'opt', x: 118, y: 754, w: 186, h: 44,
  },

  // Optional: AI Deep-Dive
  {
    id: 'ai_dive', label: 'AI Deep-Dive',
    sub: 'Claude · top-N · campaign brief',
    type: 'opt', x: 322, y: 754, w: 132, h: 44,
  },

]

// edges: from node id → to node id
const edges = [
  // finder: both intakes → parse
  { from: 'xlsx',        to: 'parse' },
  { from: 'scrape_urls', to: 'parse' },

  // finder vertical chain
  { from: 'parse',   to: 'config' },
  { from: 'config',  to: 'batch' },

  // fan out to sub-scores
  { from: 'batch', to: 'n_engage' },
  { from: 'batch', to: 'n_relevancy' },
  { from: 'batch', to: 'n_bot' },

  // fan in (engage + relevancy → weighted; bot risk is informational only)
  { from: 'n_engage',    to: 'weighted' },
  { from: 'n_relevancy', to: 'weighted' },
  { from: 'n_bot',       to: 'weighted', style: 'info' },

  { from: 'weighted', to: 'results' },

  // optional downstream steps
  { from: 'results', to: 'live_stats', style: 'opt' },
  { from: 'results', to: 'ai_dive',    style: 'opt' },
]

// ─────────────────────────────────────────────────────────────────
// NODE DETAIL CONTENT
// ─────────────────────────────────────────────────────────────────

const details = {
  xlsx: {
    title: 'XLSX Files',
    colorType: 'input',
    badge: 'use when: you already have a previous export',
    what: 'One or more Excel files exported from a previous Apify Instagram Scraper run. Each file contains rows of posts — one row per post — with columns like ownerUsername, caption, likesCount, commentsCount, hashtags, locationName, and productType. The filename (without .xlsx) becomes the brand label in the export, enabling per-brand colour coding. Also useful for re-scoring an old dataset with different niche filters without re-scraping.',
    output: 'Raw post rows, one per Instagram post',
    notes: 'Multiple files are accepted and merged. Identical usernames across files are deduplicated after aggregation.',
  },
  scrape_urls: {
    title: 'URLs / Hashtags',
    colorType: 'input',
    badge: 'use when: starting a fresh scrape now',
    what: 'Paste competitor post URLs, brand-tagged page URLs, or hashtag strings (one per line) directly into the tool — no Apify Console access needed. Hashtags like #skincare are converted to Instagram explore URLs automatically. The tool triggers an Apify Instagram Scraper run through the Cloudflare Worker proxy, polls until done, and feeds results into the same parse → score pipeline.',
    output: 'Raw post items array from Apify dataset',
    notes: 'Accounts scraped this way are labelled with sourceBrand: "scraped" in the export. Result limit is configurable (100 / 200 / 500 / 1000).',
  },
  parse: {
    title: 'aggregatePostItems',
    colorType: 'skill',
    what: 'Groups rows by ownerUsername and aggregates per-influencer stats: avgLikes, avgComments, engagementRate, videoRatio, followerCount, up to 40 deduplicated hashtags, 5 sample captions, and the most recent post URL with its like/comment/play counts. Handles both xlsx column format (hashtags/0, hashtags/1…) and Apify API array format (item.hashtags). Also reads accountLocation from city/ownerCity/country fields if present.',
    output: 'Array of influencer objects sorted by totalEngagement desc',
    notes: 'Called as parseApifyXlsx for XLSX files and directly for scraped items. Brand name is passed in for colour coding.',
  },
  config: {
    title: 'Config Step',
    colorType: 'config',
    what: 'Before scoring, the user sets: target niches (beauty, skincare, lifestyle, fashion, health, food), a minimum average-likes threshold, whether to require video content, and an optional Campaign Brief. The campaign brief is a free-text field — a sentence or two describing the campaign goal, audience, and tone. It is stored on the config object and passed to AI Deep-Dive to make qualitative verdicts campaign-specific.',
    output: 'Config object: { niches, minEngagement, requireVideo, campaignBrief }',
  },
  batch: {
    title: 'scoreInfluencers',
    colorType: 'process',
    what: 'Filters accounts below the minimum engagement threshold, then scores each remaining account. All scoring is deterministic arithmetic computed locally in the browser — no AI involved at this step. Results are returned synchronously; the progress bar updates as accounts are processed.',
    output: 'Scored results array with overall, scores, verdict, flags, nicheSignals',
  },
  n_engage: {
    title: 'scoreEngagement',
    colorType: 'sub',
    what: 'Log-scales median likes and views to produce a 0–10 score. Before live stats are fetched: log(1 + avgLikes + avgComments × 3). After Fetch Live Stats: log(1 + medianLikes + medianViews × 0.5). The natural log compresses large follower differences so a 10k-like account doesn\'t automatically swamp a 1k-like account. Views are weighted 0.5× since they require less intent than a like.',
    output: '{ score: 0–10 }',
  },
  n_relevancy: {
    title: 'scoreRelevancy',
    colorType: 'sub',
    what: 'Keyword-matches the influencer\'s hashtags, captions, and display name against niche-specific keyword lists (English + Traditional Chinese). Starts at a neutral baseline of 5 — any account in the dataset has already shown some affinity with competitor content. Adds 1 point per keyword match, deducts 1 point per off-niche category with hits (penalises unfocused accounts). Returns matched signal words for display in the table.',
    output: '{ score: 0–10, signals: string[] }',
  },
  n_bot: {
    title: 'scoreBotRisk',
    colorType: 'sub',
    what: 'Checks the comment-to-like ratio. Very high likes with near-zero comments is a bot signal. Scores 2–9: >5k likes and <0.5% comment ratio → score 2 (suspicious); ≥2% comment ratio → score 9. Accounts scoring ≤3 are flagged with "bot-risk". Bot risk score is informational only — it does not contribute to the Overall Score.',
    output: '{ score: 0–10 }',
    notes: 'Dashed arrow to Overall Score indicates informational-only: bot risk is shown in the table but excluded from the 80/20 overall formula.',
  },
  weighted: {
    title: 'Overall Score',
    colorType: 'process',
    what: 'Combines the two sub-scores into a single integer 0–100. Also generates a human-readable verdict ("strong niche fit, some niche relevancy") and a flag array (e.g. "video-creator", "strong-relevancy", "bot-risk"). The bot risk score is displayed separately but not included in the overall formula.',
    output: '{ overall, scores, verdict, flags[], nicheSignals }',
    weights: true,
  },
  results: {
    title: 'Results Table',
    colorType: 'output',
    what: 'Displays all scored influencers in a sortable, filterable table with customisable columns. Med. Likes and Med. Views show xlsx-based fallback values with an "(export)" label before live stats are fetched, upgrading in real time as live data arrives per account. Expanded rows show the full verdict, AI Deep-Dive verdict (if run), scraped caption, and post stats.',
    output: 'Interactive table + XLSX export via exportCsv.js (ExcelJS, with per-brand colour fills and workflow dropdowns)',
  },
  live_stats: {
    title: 'Fetch Live Stats',
    colorType: 'opt',
    badge: 'optional · costs ~$0.01/account',
    what: 'Triggers a parallelised Apify Instagram Scraper batch (chunks of 50) through the Cloudflare Worker proxy. Scrapes up to 10 recent posts per account, computing median likes and median views. Results are cached in localStorage for 7 days — re-running within that window skips already-cached accounts. Upgrades the Engagement Score and Overall Score in real time as each chunk completes.',
    output: 'liveStats map: { [username]: { medianLikes, medianViews, hiddenCount, followerCount } }',
  },
  ai_dive: {
    title: 'AI Deep-Dive',
    colorType: 'opt',
    badge: 'optional · costs ~$0.01–0.05/run',
    what: 'Sends the top-N accounts\' captions, hashtags, bio, and the campaign brief to Claude (claude-sonnet-4-6) via the Cloudflare Worker proxy. The Worker calls the Anthropic API server-side — the API key never reaches the browser. Returns a qualitative verdict per account, stored as aiVerdict (distinct from the deterministic verdict). Processed in batches of 10 to stay within rate limits.',
    output: 'aiVerdicts map: { [username]: string }',
    notes: 'Verdicts are cached in localStorage for 7 days per account + campaign brief combination. A different brief generates a fresh verdict even for the same account. This is the only step that calls an AI model.',
  },
}

// ─────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────

const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]))

function cx(n) { return n.x + n.w / 2 }
function cy(n) { return n.y + n.h / 2 }

function edgePoints(e) {
  const s = nodeMap[e.from]
  const t = nodeMap[e.to]
  return { x1: cx(s), y1: s.y + s.h, x2: cx(t), y2: t.y }
}

function buildPath(e) {
  const { x1, y1, x2, y2 } = edgePoints(e)
  if (Math.abs(x1 - x2) < 2) return `M ${x1} ${y1} L ${x2} ${y2}`
  const midY = (y1 + y2) / 2
  return `M ${x1} ${y1} C ${x1} ${midY} ${x2} ${midY} ${x2} ${y2}`
}

const typeClass = {
  input: 't-input', skill: 't-skill', process: 't-process',
  config: 't-config', sub: 't-sub', output: 't-output',
  opt: 't-opt', api: 't-api',
}

const headerBg = {
  input: '#A2DDD0', skill: '#F0A896', process: '#EDA082',
  config: '#B0C4EE', sub: '#F2C290', output: '#A6BEEF',
  opt: '#D4C5F0',
}

// ─────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────

function render() {
  const chart = document.getElementById('chart')

  // SVG layer
  const ns = 'http://www.w3.org/2000/svg'
  const svg = document.createElementNS(ns, 'svg')
  svg.classList.add('chart-svg')
  svg.setAttribute('viewBox', '0 0 480 860')

  svg.innerHTML = `
    <defs>
      <marker id="arr"      markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
        <path d="M0,0 L0,6 L7,3 z" fill="#999"/>
      </marker>
      <marker id="arr-opt"  markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
        <path d="M0,0 L0,6 L7,3 z" fill="#8b5ccc"/>
      </marker>
      <marker id="arr-info" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
        <path d="M0,0 L0,6 L7,3 z" fill="#bbb"/>
      </marker>
    </defs>
  `

  // Edges
  edges.forEach(e => {
    const path = document.createElementNS(ns, 'path')
    path.setAttribute('d', buildPath(e))
    path.setAttribute('fill', 'none')
    if (e.style === 'opt') {
      path.setAttribute('stroke', '#8b5ccc')
      path.setAttribute('stroke-width', '1.5')
      path.setAttribute('stroke-dasharray', '5 3')
      path.setAttribute('marker-end', 'url(#arr-opt)')
    } else if (e.style === 'info') {
      path.setAttribute('stroke', '#bbb')
      path.setAttribute('stroke-width', '1.5')
      path.setAttribute('stroke-dasharray', '3 3')
      path.setAttribute('marker-end', 'url(#arr-info)')
    } else {
      path.setAttribute('stroke', '#999')
      path.setAttribute('stroke-width', '1.5')
      path.setAttribute('marker-end', 'url(#arr)')
    }
    svg.appendChild(path)
  })

  chart.appendChild(svg)

  // Node divs
  nodes.forEach(n => {
    const el = document.createElement('div')
    el.id = 'node-' + n.id
    el.className = 'node ' + typeClass[n.type]
    el.style.cssText = `left:${n.x}px;top:${n.y}px;width:${n.w}px;height:${n.h}px`
    el.innerHTML = `
      <div class="node-label">${n.label}</div>
      ${n.sub ? `<div class="node-sublabel">${n.sub}</div>` : ''}
    `
    if (n.type !== 'api') el.addEventListener('click', () => showDetail(n.id))
    chart.appendChild(el)
  })
}

// ─────────────────────────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────────────────────────

let activeId = null

function showDetail(id) {
  const d = details[id]
  if (!d) return

  if (activeId) document.getElementById('node-' + activeId)?.classList.remove('active')
  activeId = id
  document.getElementById('node-' + id).classList.add('active')

  const bg = headerBg[d.colorType] ?? '#EDA082'

  const sidebar = document.getElementById('sidebar')
  sidebar.innerHTML = `
    <div class="detail-header" style="background:${bg}">
      <div class="detail-title">${d.title}</div>
      ${d.badge ? `<div class="detail-badge">${d.badge}</div>` : ''}
    </div>
    <div class="detail-body">
      <div>
        <div class="section-label">What it does</div>
        <div class="section-text">${d.what}</div>
      </div>
      ${d.output ? `
      <div>
        <div class="section-label">Output</div>
        <div class="output-pill">${d.output}</div>
      </div>` : ''}
      ${d.weights ? `
      <div>
        <div class="section-label">Score weights</div>
        <div class="weights-grid">
          <div class="weight-chip"><strong>Engagement</strong>× 8 (80%)</div>
          <div class="weight-chip"><strong>Relevancy</strong>× 2 (20%)</div>
          <div class="weight-chip" style="grid-column:span 2;opacity:0.6"><strong>Bot Risk</strong>informational only — not in overall</div>
        </div>
      </div>` : ''}
      ${d.notes ? `
      <div>
        <div class="section-label">Notes</div>
        <div class="section-text">${d.notes}</div>
      </div>` : ''}
    </div>
  `
}

render()
</script>
</body>
</html>
