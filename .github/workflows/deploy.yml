name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # These are public-safe vars (not secrets) — add under repo Settings → Secrets and variables → Variables.
          VITE_PROXY_URL: ${{ vars.VITE_PROXY_URL }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-worker:
    runs-on: ubuntu-latest
    # Only deploy the worker if the frontend built + deployed successfully, so a
    # failed build can't leave the new auth-required worker live against an old
    # frontend that sends no token (which would 401 every request).
    needs: build-and-deploy
    # Protected environment gate — create "worker-production" under repo
    # Settings → Environments and add required reviewers so a worker deploy
    # (which touches paid Apify/DeepSeek keys) can't run unreviewed.
    environment:
      name: worker-production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Cloudflare Worker
        run: npx wrangler@3 deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      - name: Sync Supabase JWT secret into Worker secret
        run: |
          if [ -n "$SUPABASE_JWT_SECRET" ]; then
            echo "$SUPABASE_JWT_SECRET" | npx wrangler@3 secret put SUPABASE_JWT_SECRET
          else
            echo "::warning::SUPABASE_JWT_SECRET repo secret not set — skipping sync. The worker requires it and will fail closed until it is set."
          fi
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
      - name: Sync Apify key into Worker secret
        run: echo "$APIFY_API_KEY" | npx wrangler@3 secret put APIFY_API_KEY
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
      - name: Sync DeepSeek key into Worker secret
        run: echo "$DEEPSEEK_API_KEY" | npx wrangler@3 secret put DEEPSEEK_API_KEY
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
